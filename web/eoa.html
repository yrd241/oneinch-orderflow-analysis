<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1INCH USERS</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --bg:      #f0ede4;
      --ink:     #1a1208;
      --accent:  #c0392b;
      --accent2: #2c5f4a;
      --muted:   #7a6e5f;
      --card:    #fdfaf4;
      --border:  3px solid #1a1208;
      --shadow:  6px 6px 0px #1a1208;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Press Start 2P', monospace;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      image-rendering: pixelated;
    }

    body::after {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
      z-index: 9999;
    }

    header {
      border-bottom: var(--border);
      padding: 1.5rem 2rem;
      background: var(--bg);
    }

    header h1 {
      font-size: 1.5rem;
      line-height: 1.4;
      text-shadow:
        2px 2px 0 var(--ink),
        4px 4px 0 rgba(0,0,0,0.12);
    }

    header h1 .hi { color: var(--accent); }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .card {
      background: var(--card);
      border: var(--border);
      box-shadow: var(--shadow);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -3px;
      pointer-events: none;
      background:
        linear-gradient(var(--bg), var(--bg)) top    left  / 6px 6px no-repeat,
        linear-gradient(var(--bg), var(--bg)) top    right / 6px 6px no-repeat,
        linear-gradient(var(--bg), var(--bg)) bottom left  / 6px 6px no-repeat,
        linear-gradient(var(--bg), var(--bg)) bottom right / 6px 6px no-repeat;
    }

    .card-header {
      border-bottom: var(--border);
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--ink);
    }

    .card-header h2 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--card);
    }

    .card-header .card-tag {
      margin-left: auto;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: #a09080;
    }

    .card-header h2::after {
      content: '█';
      margin-left: 0.4em;
      animation: blink 1.1s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    .time-bar {
      padding: 0.45rem 1rem;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid rgba(26,18,8,0.12);
      background: var(--card);
    }

    .filters {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(26,18,8,0.12);
      background: var(--card);
      align-items: flex-end;
    }
    .filters .f {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-width: 200px;
    }
    .filters label {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .filters select {
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.55rem 0.65rem;
      border: 2px solid rgba(26,18,8,0.7);
      background: #fffdf7;
      color: var(--ink);
      outline: none;
    }
    .filters button {
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.55rem 0.75rem;
      border: var(--border);
      background: var(--bg);
      color: var(--ink);
      box-shadow: 3px 3px 0px var(--ink);
      cursor: pointer;
    }
    .filters button:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px var(--ink);
    }

    #sankey-eoa {
      width: 100%;
      height: 560px;
    }

    /* table card */
    .table-wrap {
      overflow-x: auto;
      padding: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.55rem;
      letter-spacing: 0.05em;
    }

    th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 2px solid var(--ink);
      color: var(--muted);
      white-space: nowrap;
    }

    td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid rgba(26,18,8,0.1);
    }

    tr:hover td { background: rgba(192,57,43,0.05); }

    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .bar-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .bar {
      height: 8px;
      background: var(--accent);
      min-width: 2px;
    }

    footer {
      border-top: var(--border);
      padding: 0.8rem 2rem;
      display: flex;
      gap: 2.5rem;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: var(--ink);
    }

    footer span { color: #a09080; }
    footer code {
      font-family: inherit;
      color: var(--bg);
    }

    .err {
      color: var(--accent);
      padding: 2rem;
      font-size: 0.6rem;
      line-height: 2;
    }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,18,8,0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--card);
      border: var(--border);
      box-shadow: var(--shadow);
      width: min(640px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .modal-head {
      background: var(--ink);
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .modal-head h3 {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--card);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .modal-head .modal-count {
      font-size: 0.5rem;
      color: #a09080;
      white-space: nowrap;
    }
    .modal-close {
      font-family: inherit;
      font-size: 1.1rem;
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 0 0.3rem;
      line-height: 1;
    }

    .modal-toolbar {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid rgba(26,18,8,0.15);
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-shrink: 0;
    }
    .modal-toolbar button {
      font-family: inherit;
      font-size: 0.55rem;
      padding: 0.35rem 0.6rem;
      border: 2px solid var(--ink);
      background: var(--bg);
      color: var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
      cursor: pointer;
      letter-spacing: 0.08em;
    }
    .modal-toolbar button:active {
      transform: translate(1px,1px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    .modal-body {
      overflow-y: auto;
      padding: 0.75rem 1rem;
      font-size: 0.52rem;
      line-height: 2;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
    }
    .modal-body .addr {
      display: block;
      color: var(--ink);
      opacity: 0.85;
      border-bottom: 1px solid rgba(26,18,8,0.06);
      padding: 0.1rem 0;
    }
    .modal-body .addr:hover { opacity: 1; background: rgba(192,57,43,0.04); }
  </style>
</head>
<body>
  <header>
    <h1>1INCH <span class="hi">USERS ANALYSIS</span></h1>
    <nav style="margin-top:1rem;display:flex;gap:2rem;font-size:0.8rem;letter-spacing:0.12em;">
      <a href="/" style="color:var(--muted);text-decoration:none;">ORDERFLOW</a>
      <span style="color:var(--accent);">▶ USERS</span>
    </nav>
  </header>

  <main>
    <!-- Sankey card: EOA → Frontend -->
    <div class="card">
      <div class="card-header">
        <h2>USER → FRONTEND</h2>
      </div>
      <div class="time-bar" id="time-bar"></div>
      <div class="filters" id="filters">
        <div class="f">
          <label for="filter-user">User</label>
          <select id="filter-user"></select>
        </div>
        <div class="f">
          <label for="filter-frontend">Frontend</label>
          <select id="filter-frontend"></select>
        </div>
        <button id="filter-reset" type="button">RESET</button>
      </div>
      <div id="sankey-eoa"></div>
    </div>

    <!-- Table card: per-user summary -->
    <div class="card">
      <div class="card-header">
        <h2>USER BREAKDOWN</h2>
        <span class="card-tag">sorted by volume</span>
      </div>
      <div class="table-wrap">
        <table id="eoa-table">
          <thead>
            <tr>
              <th>USER TYPE</th>
              <th style="text-align:right">TXS</th>
              <th style="text-align:right">VOL (USD)</th>
              <th style="min-width:160px">SHARE</th>
            </tr>
          </thead>
          <tbody id="eoa-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Address modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <span class="modal-count" id="modal-count"></span>
        <button class="modal-close" id="modal-close" title="Close">✕</button>
      </div>
      <div class="modal-toolbar">
        <button id="modal-copy">COPY ALL</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <footer>
    <span>API <code>/api/summary</code></span>
    <span>STACK <code>RUST · JS · HTML</code></span>
  </footer>

  <script src="/eoa.js?v=6"></script>
</body>
</html>
